<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0f1e"/>
  <meta name="description" content="FND Tracker — daily symptom check-in for Functional Neurological Disorder"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FND Tracker"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="manifest" href="manifest.json"/>
  <title>FND Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Google Identity + Drive APIs -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0f1e;
      --surface:   #0f1628;
      --card:      #161f35;
      --card2:     #1c2840;
      --border:    #1e2d45;
      --text:      #e2e8f0;
      --muted:     #5a7194;
      --accent:    #38bdf8;
      --accent-dk: #0ea5e9;
      --violet:    #818cf8;
      --green:     #34d399;
      --green-dk:  #059669;
      --amber:     #fbbf24;
      --red:       #f87171;
      --radius:    16px;
      --font:      'DM Sans', sans-serif;
      --mono:      'DM Mono', monospace;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #root { height: 100%; display: flex; flex-direction: column; }
    .scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(76px + var(--safe-bot)); }
    ::-webkit-scrollbar { width: 0; } * { scrollbar-width: none; }

    /* ── Typography ── */
    h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.03em; }
    h2 { font-size: 1.2rem; font-weight: 600; letter-spacing: -0.02em; }
    h3 { font-size: 1rem; font-weight: 600; }

    /* ── Layout ── */
    .page { padding: 18px 16px 0; max-width: 500px; margin: 0 auto; }

    /* ── Cards ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .card-inner { background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 8px; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: 12px; border: none; font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; -webkit-tap-highlight-color: transparent; min-height: 52px; }
    .btn:active { transform: scale(0.97); opacity: .82; }
    .btn-primary  { background: var(--accent); color: #060d1e; }
    .btn-secondary{ background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost    { background: transparent; color: var(--muted); }
    .btn-green    { background: #063b28; color: var(--green); border: 1px solid #065f46; }
    .btn-red      { background: #3b0a0a; color: var(--red); border: 1px solid #7f1d1d; }
    .btn-full     { width: 100%; }
    .btn-sm       { padding: 8px 14px; font-size: 13px; min-height: 36px; border-radius: 8px; }

    /* ── Bottom Nav ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bot); z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 9px 4px; gap: 3px; cursor: pointer; color: var(--muted); font-size: 10px; font-weight: 600; letter-spacing: .02em; text-transform: uppercase; transition: color .15s; -webkit-tap-highlight-color: transparent; border: none; background: none; font-family: var(--font); }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 21px; height: 21px; }
    .nav-badge { position: relative; }
    .nav-badge::after { content: ''; position: absolute; top: -2px; right: -4px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); border: 1.5px solid var(--surface); }

    /* ── Top bar ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: calc(var(--safe-top) + 13px) 16px 10px; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .topbar-logo { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
    .logo-bolt { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--violet)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }

    /* ── Sync status pill ── */
    .sync-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .sync-dot.stale  { background: var(--amber); animation: blink 1.5s infinite; }
    .sync-dot.saving { background: var(--accent); animation: blink .5s infinite; }
    .sync-dot.offline{ background: var(--muted); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Section label ── */
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }

    /* ── Step wizard ── */
    .step-track { display: flex; gap: 5px; margin-bottom: 22px; }
    .step-pip { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background .3s; }
    .step-pip.active { background: var(--accent); }
    .step-pip.done   { background: var(--green); }

    /* ── Flare banner ── */
    .flare-banner { background: linear-gradient(120deg, #2a0808 0%, #450a0a 100%); border: 1px solid #7f1d1d; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 18px; -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
    .flare-banner:active { opacity: .8; }

    /* ── Mood grid ── */
    .mood-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 14px 0; }
    .mood-btn { aspect-ratio: 1; border-radius: 12px; border: 2px solid var(--border); background: var(--card); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; transition: border-color .15s, background .15s, transform .1s; -webkit-tap-highlight-color: transparent; }
    .mood-btn:active { transform: scale(.91); }
    .mood-btn.sel { border-color: var(--accent); background: rgba(56,189,248,.1); }
    .mood-emoji { font-size: 22px; }
    .mood-label { font-size: 10px; color: var(--muted); font-weight: 600; }

    /* ── Symptom list ── */
    .sym-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .sym-row:last-child { border-bottom: none; }
    .sym-name { font-size: 13px; font-weight: 500; flex: 1; }
    .sev-group { display: flex; gap: 4px; }
    .sev-btn { width: 34px; height: 34px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all .12s; -webkit-tap-highlight-color: transparent; }
    .sev-btn:active { transform: scale(.87); }
    .sev-btn.s1.on { background: #042512; border-color: var(--green);  color: var(--green); }
    .sev-btn.s2.on { background: #1c1206; border-color: var(--amber);  color: var(--amber); }
    .sev-btn.s3.on { background: #2a0505; border-color: var(--red);    color: var(--red); }

    /* ── Sleep ── */
    .sleep-display { font-size: 3rem; font-weight: 700; font-family: var(--mono); color: var(--accent); text-align: center; letter-spacing: -.02em; }
    .sleep-stepper { display: flex; gap: 12px; margin: 10px 0 18px; }
    .sleep-btn { flex: 1; height: 52px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--card2); color: var(--text); font-size: 26px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .1s; }
    .sleep-btn:active { background: var(--border); }
    .quality-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .quality-btn { padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; transition: all .12s; -webkit-tap-highlight-color: transparent; }
    .quality-btn.sel { border-color: var(--violet); background: rgba(129,140,248,.12); color: var(--violet); }

    /* ── Emotion chips ── */
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip { padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card2); color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .12s; -webkit-tap-highlight-color: transparent; }
    .chip:active { transform: scale(.95); }
    .chip.sel { border-color: var(--violet); background: rgba(129,140,248,.12); color: var(--violet); }

    /* ── Notes ── */
    textarea { width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: var(--font); font-size: 14px; resize: none; outline: none; transition: border-color .2s; min-height: 82px; }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* ── History ── */
    .day-group { border-left: 2.5px solid var(--border); padding-left: 14px; margin-bottom: 22px; }
    .day-group.flare { border-left-color: var(--red); }
    .day-group.good  { border-left-color: var(--green); }
    .day-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 8px; }
    .entry-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
    .entry-top { display: flex; align-items: center; gap: 10px; }
    .entry-emoji { font-size: 22px; flex-shrink: 0; }
    .entry-info { flex: 1; }
    .entry-time { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .entry-who  { font-size: 11px; color: var(--accent); font-weight: 600; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .pill { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .pill.blue   { background: rgba(56,189,248,.1);  color: var(--accent); border: 1px solid rgba(56,189,248,.2); }
    .pill.green  { background: rgba(52,211,153,.1);  color: var(--green);  border: 1px solid rgba(52,211,153,.2); }
    .pill.amber  { background: rgba(251,191,36,.1);  color: var(--amber);  border: 1px solid rgba(251,191,36,.2); }
    .pill.red    { background: rgba(248,113,113,.1); color: var(--red);    border: 1px solid rgba(248,113,113,.2); }
    .pill.violet { background: rgba(129,140,248,.1); color: var(--violet); border: 1px solid rgba(129,140,248,.2); }

    /* ── Stats ── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 700; font-family: var(--mono); }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Auth / Onboarding ── */
    .splash { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
    .splash-logo { width: 80px; height: 80px; background: linear-gradient(135deg, var(--accent), var(--violet)); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; box-shadow: 0 0 40px rgba(56,189,248,.2); }
    .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 24px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--card); color: var(--text); font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s; min-height: 52px; min-width: 260px; -webkit-tap-highlight-color: transparent; }
    .google-btn:active { transform: scale(.97); }
    .google-icon { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Drive setup ── */
    .setup-step { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .setup-step:last-child { border-bottom: none; }
    .step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #060d1e; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .step-num.done { background: var(--green); }

    /* ── Modal ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: flex-end; padding: 16px; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 22px; width: 100%; max-width: 480px; margin: 0 auto; max-height: 80vh; overflow-y: auto; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: calc(76px + var(--safe-bot) + 10px); left: 50%; transform: translateX(-50%) translateY(16px); background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 600; white-space: nowrap; z-index: 300; pointer-events: none; opacity: 0; transition: opacity .2s, transform .2s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Loading ── */
    .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; color: var(--muted); font-size: 14px; }
    .spinner { width: 30px; height: 30px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Info box ── */
    .info-box { background: rgba(56,189,248,.05); border: 1px solid rgba(56,189,248,.15); border-radius: 12px; padding: 12px 14px; font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
    .info-box strong { color: var(--text); }
    .info-box a { color: var(--accent); text-decoration: none; }

    /* ── Animations ── */
    .fade-in { animation: fadeIn .22s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── Print styles (doctor report) ── */
    @media print {
      body { background: white; color: black; }
      .bottom-nav, .topbar, .btn, .modal-backdrop { display: none !important; }
      .scroll-area { overflow: visible; padding: 0; }
      .print-report { display: block !important; }
    }
    .print-report { display: none; }
  </style>
</head>

<div id="root">
  <div class="loader" id="initial-loader">
    <div class="spinner"></div>
    <span id="loader-msg">Starting up…</span>
    <button id="reload-btn" onclick="window.location.reload()" style="display:none;margin-top:16px;padding:10px 20px;border-radius:10px;border:1px solid #1e2d45;background:#161f35;color:#e2e8f0;font-family:inherit;font-size:14px;cursor:pointer;">Tap to reload</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  setTimeout(function() {
    var loader = document.getElementById('initial-loader');
    if (!loader) return;
    var msg = document.getElementById('loader-msg');
    var btn = document.getElementById('reload-btn');
    if (msg) msg.textContent = 'Taking longer than expected…';
    if (btn) btn.style.display = 'block';
  }, 12000);
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

/* ═══════════════════════════════════════════════════════════
   CONFIGURATION
   Replace CLIENT_ID with your own Google Cloud OAuth client ID.
   See SETUP.md for instructions.
   ═══════════════════════════════════════════════════════════ */
const CLIENT_ID = localStorage.getItem('fnd_google_client_id') || '';
const DRIVE_FILE_NAME = 'fnd-tracker-data.json';
const SCOPES = 'https://www.googleapis.com/auth/drive.file openid email profile';

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════ */
const SYMPTOMS = [
  "Seizures / Episodes","Tremors","Brain Fog","Fatigue",
  "Headache / Migraine","Dizziness","Tingling / Numbness",
  "Vision Changes","Speech Difficulties","Weakness",
  "Pain","Nausea","Anxiety / Mood"
];
const EMOTIONS = [
  "Grateful","Hopeful","Calm","Tired","Frustrated","Anxious",
  "Sad","Overwhelmed","Proud","Loved","Isolated","Content"
];
const SLEEP_QUALITY = ["Poor","Fair","Good","Great"];
const MOODS = [
  { emoji:"😄", label:"Great", score:5 },
  { emoji:"🙂", label:"Good",  score:4 },
  { emoji:"😐", label:"Okay",  score:3 },
  { emoji:"😞", label:"Low",   score:2 },
  { emoji:"😣", label:"Awful", score:1 },
];
const FLARE_PRESET = {
  mood:1, sleep:4, sleepQuality:"Poor",
  symptoms: Object.fromEntries(SYMPTOMS.map(s=>[s,3])),
  emotions: ["Overwhelmed","Frustrated","Tired"],
  notes: "Flare day — auto-filled"
};

/* ═══════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

function toast(msg, color='var(--green)') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = color;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function fmt_date(iso) {
  return new Date(iso).toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
}
function fmt_time(iso) {
  return new Date(iso).toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function fmt_rel(iso) {
  const d = Date.now() - new Date(iso).getTime();
  if (d < 60000) return 'just now';
  if (d < 3600000) return Math.floor(d/60000)+'m ago';
  if (d < 86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}

function groupByDay(entries) {
  const g = {};
  entries.forEach(e => {
    const k = new Date(e.timestamp).toDateString();
    (g[k] = g[k] || []).push(e);
  });
  return Object.entries(g).sort((a,b) => new Date(b[0]) - new Date(a[0]));
}

const moodEmoji = score => MOODS.find(m=>m.score===score)?.emoji || '—';

/* ═══════════════════════════════════════════════════════════
   GOOGLE DRIVE API
   ═══════════════════════════════════════════════════════════ */
class DriveSync {
  constructor(accessToken) {
    this.token = accessToken;
    this.fileId = null;
  }

  async req(url, opts={}) {
    const r = await fetch(url, {
      ...opts,
      headers: { 'Authorization': `Bearer ${this.token}`, ...(opts.headers||{}) }
    });
    if (!r.ok) throw new Error(`Drive API ${r.status}: ${await r.text()}`);
    return r;
  }

  // Find existing data file by name
  async findFile() {
    const r = await this.req(
      `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}' and trashed=false&fields=files(id,name,modifiedTime)&spaces=drive`
    );
    const data = await r.json();
    return data.files?.[0] || null;
  }

  // Create empty data file
  async createFile(data) {
    const meta = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
    const body = JSON.stringify(data);
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file',     new Blob([body],                  { type: 'application/json' }));
    const r = await this.req(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', body: form }
    );
    const d = await r.json();
    this.fileId = d.id;
    return d.id;
  }

  // Download data file content
  async readFile(fileId) {
    const r = await this.req(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
    );
    return r.json();
  }

  // Overwrite data file with new content
  async writeFile(fileId, data) {
    const body = JSON.stringify(data);
    await this.req(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body }
    );
  }

  // Load or create file, return { fileId, data }
  async init() {
    let file = await this.findFile();
    if (!file) {
      const emptyData = { checkins: [], version: 1, createdAt: new Date().toISOString() };
      const id = await this.createFile(emptyData);
      return { fileId: id, data: emptyData, isNew: true };
    }
    const data = await this.readFile(file.id);
    this.fileId = file.id;
    return { fileId: file.id, data, isNew: false };
  }

  async save(fileId, data) {
    await this.writeFile(fileId, data);
  }

  async refresh(fileId) {
    return this.readFile(fileId);
  }
}

function AuthScreen({ clientId, onToken }) {
  const btnRef = useRef();
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    function tryRender() {
      if (!window.google?.accounts?.id) { setTimeout(tryRender, 200); return; }
      window.google.accounts.id.initialize({
        client_id: clientId,
        callback: () => {},
        auto_select: false,
      });
      // We use the OAuth2 token client for Drive access
    }
    tryRender();
  }, [clientId]);

  function signIn() {
    setLoading(true);
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: SCOPES,
      callback: (resp) => {
        setLoading(false);
        if (resp.access_token) {
          onToken(resp.access_token);
        } else {
          toast('Sign-in failed or cancelled', 'var(--red)');
        }
      },
    });
    client.requestAccessToken();
  }

  return (
    <div className="splash fade-in">
      <div className="splash-logo">⚡</div>
      <h1 style={{marginBottom:8}}>FND Tracker</h1>
      <p style={{color:'var(--muted)',fontSize:15,marginBottom:10,lineHeight:1.6}}>

/* ═══════════════════════════════════════════════════════════
   CHECK-IN WIZARD
   ═══════════════════════════════════════════════════════════ */
function CheckInWizard({ onDone }) {
  const { saveCheckin, userInfo } = useContext(AppCtx);
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ mood:null, symptoms:{}, sleep:7, sleepQuality:null, emotions:[], notes:'' });
  const [saving, setSaving] = useState(false);

  const steps = ['Mood','Symptoms','Sleep','Feelings'];

  function flareDay() {
    setData({ ...FLARE_PRESET });
    setStep(3);
    toast('⚡ Flare day preset applied', 'var(--red)');
  }

  function toggleSym(name, val) {
    setData(p => ({ ...p, symptoms: { ...p.symptoms, [name]: p.symptoms[name]===val ? 0 : val } }));
  }

  function toggleEmotion(e) {
    setData(p => ({ ...p, emotions: p.emotions.includes(e) ? p.emotions.filter(x=>x!==e) : [...p.emotions,e] }));
  }

  async function save() {
    setSaving(true);
    const checkin = {
      id: uid(),
      timestamp: new Date().toISOString(),
      userName: userInfo?.name || 'You',
      userEmail: userInfo?.email || '',
      ...data
    };
    await saveCheckin(checkin);
    toast('Check-in saved ✓');
    onDone();
    setSaving(false);
  }

  return (
    <div className="page fade-in">
      {/* Flare shortcut */}
      <div className="flare-banner" onClick={flareDay}>
        <span style={{fontSize:26}}>🔥</span>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--red)'}}>Flare Day</div>
          <div style={{fontSize:12,color:'#fca5a5',marginTop:1}}>One tap — auto-fills all severe symptoms</div>
        </div>
        <span style={{color:'var(--red)',fontSize:18}}>›</span>
      </div>

      {/* Progress */}
      <div className="step-track">
        {steps.map((s,i) => <div key={s} className={`step-pip ${i<step?'done':i===step?'active':''}`}/>)}
      </div>

      <h2 style={{marginBottom:3}}>{steps[step]}</h2>
      <p style={{color:'var(--muted)',fontSize:13,marginBottom:18}}>
        {step===0 && "How are you feeling overall today?"}
        {step===1 && "Tap any symptoms you have. 1 = mild · 2 = moderate · 3 = severe"}
        {step===2 && "How did you sleep last night?"}
        {step===3 && "Emotional state and any notes."}
      </p>

      {/* Step 0 — Mood */}
      {step===0 && (
        <div className="mood-grid">
          {MOODS.map(m => (
            <div key={m.score} className={`mood-btn ${data.mood===m.score?'sel':''}`}
              onClick={()=>setData(p=>({...p,mood:m.score}))}>
              <span className="mood-emoji">{m.emoji}</span>
              <span className="mood-label">{m.label}</span>
            </div>
          ))}
        </div>
      )}

      {/* Step 1 — Symptoms */}
      {step===1 && (
        <div>
          {SYMPTOMS.map(s => (
            <div key={s} className="sym-row">
              <span className="sym-name">{s}</span>
              <div className="sev-group">
                {[1,2,3].map(n => (
                  <button key={n} className={`sev-btn s${n} ${data.symptoms[s]===n?'on':''}`}
                    onClick={()=>toggleSym(s,n)}>{n}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Step 2 — Sleep */}
      {step===2 && (
        <div>
          <div className="sleep-display">{data.sleep}h</div>
          <div className="sleep-stepper">
            <button className="sleep-btn" onClick={()=>setData(p=>({...p,sleep:Math.max(0,p.sleep-.5)}))}>−</button>
            <button className="sleep-btn" onClick={()=>setData(p=>({...p,sleep:Math.min(14,p.sleep+.5)}))}>+</button>
          </div>
          <div className="section-label">Sleep quality</div>
          <div className="quality-row">
            {SLEEP_QUALITY.map(q => (
              <button key={q} className={`quality-btn ${data.sleepQuality===q?'sel':''}`}
                onClick={()=>setData(p=>({...p,sleepQuality:q}))}>{q}</button>
            ))}
          </div>
        </div>
      )}

      {/* Step 3 — Feelings + notes */}
      {step===3 && (
        <div>
          <div className="section-label">How are you feeling emotionally?</div>
          <div className="chip-wrap">
            {EMOTIONS.map(e => (
              <div key={e} className={`chip ${data.emotions.includes(e)?'sel':''}`}
                onClick={()=>toggleEmotion(e)}>{e}</div>
            ))}
          </div>
          <div className="section-label" style={{marginTop:18}}>Notes (optional)</div>
          <textarea placeholder="Anything else to capture…"
            value={data.notes} onChange={e=>setData(p=>({...p,notes:e.target.value}))}/>
        </div>
      )}

      {/* Navigation */}
      <div style={{display:'flex',gap:10,marginTop:24,marginBottom:8}}>
        {step>0 && <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setStep(p=>p-1)}>← Back</button>}
        {step<3
          ? <button className="btn btn-primary" style={{flex:2}}
              disabled={step===0&&data.mood===null}
              onClick={()=>setStep(p=>p+1)}>Next →</button>
          : <button className="btn btn-green" style={{flex:2}} onClick={save} disabled={saving}>
              {saving?'Saving…':'✓ Save Check-in'}
            </button>
        }
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   INSIGHTS
   ═══════════════════════════════════════════════════════════ */
function InsightsScreen() {
  const { checkins } = useContext(AppCtx);
  const now = Date.now();
  const last30 = checkins.filter(c => now-new Date(c.timestamp).getTime() < 30*86400000);

  if (!last30.length) return (
    <div className="page" style={{textAlign:'center',paddingTop:60}}>
      <div style={{fontSize:48,marginBottom:12}}>📊</div>
      <h3>No data yet</h3>
      <p style={{color:'var(--muted)',marginTop:8,fontSize:14}}>Log a few check-ins to see trends.</p>
    </div>
  );

  const avgMood  = (last30.reduce((s,c)=>s+(c.mood||3),0)/last30.length).toFixed(1);
  const avgSleep = (last30.reduce((s,c)=>s+(c.sleep||7),0)/last30.length).toFixed(1);
  const flareDays = last30.filter(c=>Object.values(c.symptoms||{}).some(v=>v>=3)).length;
  const goodDays  = last30.filter(c=>(c.mood||3)>=4).length;

  // Symptom frequency
  const symFreq = {};
  last30.forEach(c=>Object.entries(c.symptoms||{}).forEach(([k,v])=>{ if(v>0) symFreq[k]=(symFreq[k]||0)+1; }));
  const topSyms = Object.entries(symFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Emotion frequency
  const emoFreq = {};
  last30.forEach(c=>(c.emotions||[]).forEach(e=>{ emoFreq[e]=(emoFreq[e]||0)+1; }));
  const topEmos = Object.entries(emoFreq).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // 7-day mood trend
  const trend = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const dayStr = d.toDateString();
    const dayItems = checkins.filter(c=>new Date(c.timestamp).toDateString()===dayStr);
    return {
      lbl: d.toLocaleDateString('en-CA',{weekday:'short'}),
      avg: dayItems.length ? dayItems.reduce((s,c)=>s+(c.mood||3),0)/dayItems.length : null
    };
  });

  return (
    <div className="page fade-in">
      <div className="section-label" style={{marginBottom:12}}>Last 30 Days</div>

      <div className="stat-grid">
        <div className="stat-box"><div className="stat-num">{avgMood}</div><div className="stat-lbl">Avg mood</div></div>
        <div className="stat-box"><div className="stat-num">{avgSleep}h</div><div className="stat-lbl">Avg sleep</div></div>
        <div className="stat-box"><div className="stat-num" style={{color:'var(--red)'}}>{flareDays}</div><div className="stat-lbl">Flare days</div></div>
        <div className="stat-box"><div className="stat-num" style={{color:'var(--green)'}}>{goodDays}</div><div className="stat-lbl">Good days</div></div>
      </div>

      {/* Mood bar chart */}
      <div className="card">
        <div className="section-label" style={{marginBottom:12}}>Mood this week</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:8,height:72}}>
          {trend.map((d,i)=>(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div style={{
                width:'100%',
                height: d.avg ? `${(d.avg/5)*62}px` : '3px',
                background: d.avg ? `hsl(${(d.avg-1)*25+180},60%,55%)` : 'var(--border)',
                borderRadius:5, transition:'height .3s'
              }}/>
              <span style={{fontSize:10,color:'var(--muted)'}}>{d.lbl}</span>
            </div>
          ))}
        </div>
      </div>

      {topSyms.length>0 && (
        <div className="card">
          <div className="section-label" style={{marginBottom:10}}>Most frequent symptoms</div>
          {topSyms.map(([name,count])=>(
            <div key={name} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:500}}>{name}</span>

/* ═══════════════════════════════════════════════════════════
   OFFLINE QUEUE HELPERS
   Check-ins written while offline are held in localStorage
   under 'fnd_offline_queue' as a JSON array.
   On reconnect they are merged into Drive safely.
   ═══════════════════════════════════════════════════════════ */
const QUEUE_KEY = 'fnd_offline_queue';

function loadQueue() {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch { return []; }
}
function saveQueue(q) {
  localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
}
function clearQueue() {
  localStorage.removeItem(QUEUE_KEY);
}

// Merge any number of check-in arrays by unique ID, sort newest-first
function mergeAllCheckins(...arrays) {
  const seen = new Set();
  return arrays.flat().filter(c => {
    if (!c?.id || seen.has(c.id)) return false;
    seen.add(c.id);
    return true;
  }).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP — orchestrates Drive sync + all screens
   ═══════════════════════════════════════════════════════════ */
function MainApp({ token, userInfo, fileId, initialData, driveInstance }) {
  // Merge initial Drive data with anything already in the offline queue
  // (handles the case where the user logged in, added entries, then the
  // app reloaded before a sync completed)
  const initCheckins = mergeAllCheckins(
    initialData?.checkins || [],
    loadQueue()
  );

  const [checkins, setCheckins] = useState(initCheckins);
  const [tab, setTab] = useState('home');
  const [syncStatus, setSyncStatus] = useState('synced');
  const [lastSynced, setLastSynced]   = useState(new Date().toISOString());
  const [offlineCount, setOfflineCount] = useState(loadQueue().length);
  const isSyncing = useRef(false);
  const syncTimer = useRef(null);

  // ── Core merge-and-write: read Drive → merge → write back ──────────
  // This is the ONLY function that writes to Drive.
  // It always reads the current Drive state first to avoid overwriting
  // entries made on another device while this one was offline.
  const syncToDrive = useCallback(async (localCheckins) => {
    if (isSyncing.current) return;
    if (!navigator.onLine) {
      setSyncStatus('offline');
      return;
    }
    isSyncing.current = true;
    setSyncStatus('saving');
    try {
      // 1. Read what Drive currently has
      const remote = await driveInstance.readFile(fileId);
      const remoteCheckins = remote?.checkins || [];

      // 2. Load the offline queue (entries made while offline)
      const queued = loadQueue();

      // 3. Three-way merge: Drive + local state + offline queue
      //    Deduplication by ID ensures nothing is doubled or lost
      const merged = mergeAllCheckins(remoteCheckins, localCheckins, queued);

      // 4. Write the merged result back to Drive
      const payload = { ...remote, checkins: merged, lastModified: new Date().toISOString() };
      await driveInstance.writeFile(fileId, payload);

      // 5. Clear the offline queue — everything is now in Drive
      clearQueue();
      setOfflineCount(0);

      // 6. Update local state to the merged truth
      setCheckins(merged);
      setLastSynced(new Date().toISOString());
      setSyncStatus('synced');
    } catch(e) {
      setSyncStatus('error');
      // Don't discard data — leave offline queue intact for next attempt
    }
    isSyncing.current = false;
  }, [fileId, driveInstance]);

  // ── Schedule a sync (debounced 4s) ─────────────────────────────────
  const scheduleSync = useCallback((latestCheckins) => {
    clearTimeout(syncTimer.current);
    setSyncStatus(navigator.onLine ? 'stale' : 'offline');
    syncTimer.current = setTimeout(() => syncToDrive(latestCheckins), 4000);
  }, [syncToDrive]);

  // ── Sync on reconnect ───────────────────────────────────────────────
  useEffect(() => {
    const handleOnline = () => {
      setSyncStatus('stale');
      // Flush immediately when connectivity returns
      setCheckins(current => {
        syncToDrive(current);
        return current;
      });
    };
    const handleOffline = () => setSyncStatus('offline');
    window.addEventListener('online',  handleOnline);
    window.addEventListener('offline', handleOffline);
    return () => {
      window.removeEventListener('online',  handleOnline);
      window.removeEventListener('offline', handleOffline);
    };
  }, [syncToDrive]);

  // ── Sync on app foreground (handles long offline periods) ───────────
  useEffect(() => {
    const handleVisible = () => {
      if (document.visibilityState === 'visible' && navigator.onLine) {
        setCheckins(current => { syncToDrive(current); return current; });
      }
    };
    document.addEventListener('visibilitychange', handleVisible);
    return () => document.removeEventListener('visibilitychange', handleVisible);
  }, [syncToDrive]);

  // ── Save a new check-in ─────────────────────────────────────────────
  function saveCheckin(entry) {
    const next = [entry, ...checkins];
    setCheckins(next);

    if (!navigator.onLine) {
      // Save to offline queue so it survives a page reload
      const q = loadQueue();
      q.push(entry);
      saveQueue(q);
      setOfflineCount(q.length);
      setSyncStatus('offline');
      toast('Saved locally — will sync when online', 'var(--amber)');
    } else {
      scheduleSync(next);
    }
  }

  // ── Delete a check-in ───────────────────────────────────────────────
  function deleteCheckin(id) {
    const next = checkins.filter(c=>c.id!==id);
    setCheckins(next);
    // Also remove from offline queue if it was queued but never synced
    const q = loadQueue().filter(c=>c.id!==id);
    saveQueue(q);
    setOfflineCount(q.length);
    if (navigator.onLine) scheduleSync(next);
    toast('Deleted', 'var(--amber)');
  }

  // ── Manual sync button ──────────────────────────────────────────────
  function manualSync() {
    setCheckins(current => {
      syncToDrive(current).then(() => toast('Synced ✓'));
      return current;
    });
  }

  function signOut() {
    if (!window.confirm('Sign out?')) return;
    clearTimeout(syncTimer.current);
    localStorage.removeItem('fnd_token');
    localStorage.removeItem('fnd_file_id');
    window.location.reload();
  }

  const syncDotState = syncStatus==='saving'?'saving'
    : syncStatus==='stale'  ?'stale'
    : syncStatus==='offline'?'offline'
    : syncStatus==='error'  ?'offline'
    : '';

  const ctx = { checkins, saveCheckin, deleteCheckin, manualSync, userInfo, fileId, driveSync:driveInstance, signOut, syncStatus, lastSynced, offlineCount };

  const navItems = [
    { id:'home',     label:'Home',    Icon:Icons.Home    },
    { id:'checkin',  label:'Check-in',Icon:Icons.Plus    },
    { id:'history',  label:'History', Icon:Icons.List    },
    { id:'insights', label:'Insights',Icon:Icons.Chart   },
    { id:'settings', label:'Settings',Icon:Icons.Settings},
  ];

  const syncLabel = syncStatus==='saving'  ? 'Saving…'
    : syncStatus==='offline' ? (offlineCount>0 ? `${offlineCount} queued` : 'Offline')
    : syncStatus==='error'   ? 'Sync error'
    : syncStatus==='stale'   ? 'Pending'
    : 'Drive ✓';

  return (
    <AppCtx.Provider value={ctx}>
      {/* Top bar */}
      <div className="topbar">
        <div className="topbar-logo">
          <div className="logo-bolt">⚡</div>
          FND Tracker
        </div>
        <div className="sync-pill" onClick={manualSync} title="Tap to sync now">
          <div className={`sync-dot ${syncDotState}`}/>
          <span>{syncLabel}</span>
        </div>
      </div>

      {/* Content */}
      <div className="scroll-area">
        {tab==='home'     && <HomeScreen onCheckin={()=>setTab('checkin')}/>}
        {tab==='checkin'  && <CheckInWizard onDone={()=>setTab('home')}/>}
        {tab==='history'  && <HistoryScreen/>}
        {tab==='insights' && <InsightsScreen/>}
        {tab==='settings' && <SettingsScreen/>}
      </div>

      {/* Bottom nav */}
      <nav className="bottom-nav">
        {navItems.map(n=>(
          <button key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            <n.Icon/>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>
    </AppCtx.Provider>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT — top-level auth + Drive init state machine
   ═══════════════════════════════════════════════════════════ */
function Root() {
  const [clientId, setClientId] = useState(localStorage.getItem('fnd_google_client_id') || '');
  const [token, setToken]       = useState(null);
  const [userInfo, setUserInfo] = useState(null);
  const [fileId, setFileId]     = useState(localStorage.getItem('fnd_file_id') || null);
  const [driveData, setDriveData]       = useState(null);
  const [driveInstance, setDriveInstance] = useState(null);
  const [status, setStatus]     = useState('idle');
  const [errorMsg, setErrorMsg] = useState('');
  const [gsiReady, setGsiReady] = useState(!!window.google?.accounts?.oauth2);

  // Poll until the Google Identity Services script has loaded
  useEffect(() => {
    if (gsiReady) return;
    let attempts = 0;
    const t = setInterval(() => {
      attempts++;
      if (window.google?.accounts?.oauth2) {
        setGsiReady(true);
        clearInterval(t);
      } else if (attempts > 30) {
        clearInterval(t);
        setErrorMsg('Could not load Google sign-in. Check your internet connection and reload the app.');
        setStatus('error');
      }
    }, 500);
    return () => clearInterval(t);
  }, [gsiReady]);

  async function handleToken(accessToken) {
    setToken(accessToken);
    setStatus('loading');
    try {
      // Get user info
      const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const info = await r.json();
      setUserInfo(info);

      const drive = new DriveSync(accessToken);
      setDriveInstance(drive);

      // If we have a remembered file ID, load it directly
      if (fileId) {
        try {
          const data = await drive.readFile(fileId);
          setDriveData(data);
          setStatus('ready');
          return;
        } catch(e) {
          // File may have been deleted or unshared — fall through to pick
          localStorage.removeItem('fnd_file_id');
          setFileId(null);
        }
      }

      // Otherwise init (find or create)
      const { fileId: fid, data, isNew } = await drive.init();
      localStorage.setItem('fnd_file_id', fid);
      setFileId(fid);
      setDriveData(data);
      setStatus('ready');
      if (isNew) toast('New data file created in Drive 🎉');
    } catch(e) {
      setErrorMsg(e.message);
      setStatus('error');
    }
  }

  async function handleFilePick(pickedId) {
    setStatus('loading');
    try {
      if (!pickedId) {
        const emptyData = { checkins:[], version:1, createdAt:new Date().toISOString() };
        const id = await driveInstance.createFile(emptyData);
        localStorage.setItem('fnd_file_id', id);
        setFileId(id);
        setDriveData(emptyData);
      } else {
        const data = await driveInstance.readFile(pickedId);
        localStorage.setItem('fnd_file_id', pickedId);
        setFileId(pickedId);
        setDriveData(data);
      }
      setStatus('ready');
    } catch(e) {
      setErrorMsg(e.message);
      setStatus('error');
    }
  }

  if (status==='error')   return (
    <div className="splash">
      <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
      <h2 style={{marginBottom:8}}>Something went wrong</h2>
      <p style={{color:'var(--muted)',fontSize:14,marginBottom:20,maxWidth:280,lineHeight:1.6}}>{errorMsg}</p>
      <button className="btn btn-secondary" onClick={()=>{setToken(null);setStatus('idle');setGsiReady(!!window.google?.accounts?.oauth2);}}>← Try again</button>
    </div>
  );
  if (!clientId) return <ClientIdSetup onSave={setClientId}/>;
  if (!gsiReady) return <div className="loader"><div className="spinner"/><span>Loading Google sign-in…</span></div>;
  if (!token)   return <AuthScreen clientId={clientId} onToken={handleToken}/>;
  if (status==='loading') return <div className="loader"><div className="spinner"/><span>Loading Drive data…</span></div>;
  if (status==='file-pick') return <DriveFilePicker drive={driveInstance} onFile={handleFilePick}/>;
  if (status==='ready') return <MainApp token={token} userInfo={userInfo} fileId={fileId} initialData={driveData} driveInstance={driveInstance}/>;

  return <div className="loader"><div className="spinner"/><span>Starting up…</span></div>;
}

/* ── Mount ── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);
</script>

<!-- Service worker registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>

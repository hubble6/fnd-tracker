<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#030712"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FND Tracker"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="manifest" href="manifest.json"/>
  <title>FND Tracker</title>
  <!-- Fonts loaded from CDN with offline fallback via service worker cache -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:clamp(13px,0.7vw + 10px,22px);}
    body{background:#030712;font-family:'DM Sans','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;}
    button,input,select,textarea{font-size:inherit;font-family:inherit;}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#0a0f0a;}::-webkit-scrollbar-thumb{background:#1a3a20;border-radius:3px;}
    *{scrollbar-width:thin;scrollbar-color:#1a3a20 #0a0f0a;}
  </style>
</head>
<body>
<div id="root">
  <div id="root-loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#6EE7B7;gap:12px;background:#030712;">
    <div style="font-size:2.2rem">⚡</div>
    <div style="font-weight:700;font-size:1.1rem">FND Tracker</div>
    <div style="color:#6b7280;font-size:.8rem" id="loader-msg">Starting up…</div>
    <button id="reload-btn" onclick="window.location.reload()" style="display:none;margin-top:12px;padding:9px 20px;border-radius:10px;border:1px solid #1e2d45;background:#111827;color:#e2e8f0;cursor:pointer;font-family:inherit;font-size:.85rem;">Tap to reload</button>
  </div>
</div>
<script>
  setTimeout(function(){
    var l=document.getElementById('root-loader');
    if(!l||l.style.display==='none')return;
    var m=document.getElementById('loader-msg');var b=document.getElementById('reload-btn');
    if(m)m.textContent='Taking longer than expected…';if(b)b.style.display='block';
  },5000);
</script>
<!-- Vendor scripts bundled locally — works fully offline and in APK -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/babel.min.js"></script>
<script src="app.js" type="text/babel"></script>
<script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));</script>
</body>
</html>
